<head>
    <link rel="stylesheet" href="tp.css">
</head>
<body>
    <div class="map">
        <h1 class="text-center">Get directions for your ride!</h1>
        <br>
        <div class="container">
            <div class="form-group">
                <input type="text" class="form-control" placeholder="Destination Location" id="dest">
            </div>
            <button class="btn btn-secondary" onclick="startNavigation()">Start Navigation</button>
            <button class="btn-end-ride" onclick="endNavigation()">End Ride</button>
            <div id="map" style="width: 100%; height: 400px; margin-top: 20px;"></div>
            <p id="eta" style="margin-top: 20px; font-weight: bold;"></p> <!-- ETA Display -->
        </div>
    </div>
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="custom-modal" id="completionModal">
        <h2 class="modal-title">🎉 Ride Completed!</h2>
        <p>Thank you for riding with us. Would you like to share your experience?</p>
        <button class="modal-button" onclick="goToReview()">Leave a Review</button>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDN_c_kIVQSjAa6o4cO1otMNFFOncH4niU&libraries=places"></script>
    <script>
        let map, directionsService, directionsRenderer;
        let destAutocomplete;
        let marker, watchId;
        let destinationLocation;

        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 19.3852, lng:72.8334 },
                zoom: 13
            });
            
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer();
            directionsRenderer.setMap(map);

            destAutocomplete = new google.maps.places.Autocomplete(document.getElementById("dest"));
        }

        function startNavigation() {
            const destination = document.getElementById("dest").value;
            if (!destination) {
                alert("Please enter a destination location.");
                return;
            }
            
            // Geocode destination location to get coordinates
            const geocoder = new google.maps.Geocoder();
            geocoder.geocode({ 'address': destination }, function(results, status) {
                if (status === 'OK') {
                    destinationLocation = results[0].geometry.location;
                    if (navigator.geolocation) {
                        watchId = navigator.geolocation.watchPosition(position => {
                            const currentPos = {
                                lat: position.coords.latitude,
                                lng: position.coords.longitude
                            };

                            if (!marker) {
                                marker = new google.maps.Marker({
                                    position: currentPos,
                                    map: map,
                                    title: "Your Location"
                                });
                            } else {
                                marker.setPosition(currentPos);
                            }

                            updateRoute(currentPos);
                        }, () => {
                            handleLocationError(true, map.getCenter());
                        });
                    } else {
                        handleLocationError(false, map.getCenter());
                    }
                } else {
                    alert("Geocode was not successful for the following reason: " + status);
                }
            });
        }

        function updateRoute(currentPos) {
            const request = {
                origin: currentPos,
                destination: destinationLocation,
                travelMode: google.maps.TravelMode.TWO_WHEELER
            };

            directionsService.route(request, function(result, status) {
                if (status == google.maps.DirectionsStatus.OK) {
                    directionsRenderer.setDirections(result);

                    // Calculate and display ETA
                    const route = result.routes[0];
                    const leg = route.legs[0];
                    const eta = leg.duration.text;
                    document.getElementById("eta").innerText = `Estimated Time of Arrival: ${eta}`;
                } else {
                    console.error("Could not update directions: " + status);
                }
            });
        }

        function endNavigation() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
            }
            
            if (marker) {
                marker.setMap(null);
                marker = null;
            }
            
            directionsRenderer.setDirections({ routes: [] });
            document.getElementById("eta").innerText = ""; // Clear ETA display
            showCompletionModal();
        }

        function showCompletionModal() {
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('completionModal').style.display = 'block';
        }

        function goToReview() {
            window.location.href = '/Review/review.html';
        }

        document.getElementById('modalOverlay').onclick = function() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('completionModal').style.display = 'none';
        };

        function handleLocationError(browserHasGeolocation, pos) {
            alert(browserHasGeolocation ?
                "Error: The Geolocation service failed." :
                "Error: Your browser doesn't support geolocation.");
        }

        window.onload = initMap;
    </script>
</body>
