<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="/ContactUs/cont.css">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css">
</head>

<body>
    <!-- navbar -->
    <nav class="navbar">
        <div class="Container">
            <div class="Logo">
                <img src="/img/giphy.gif" alt="Logo">
            </div>
            <div class="nav-links" id="navLinks">
                <ul>
                    <li><a href="/index.html">Home</a></li>
                    <li><a href="/ridestrack/ridestrack.html" class="active">track Ride</a></li>
                    <li><a href="/About us/about.html">About</a></li>
                    <li><a href="/ContactUs/contact.html">Contact</a></li>
                    <li><a href="/Review/review.html">Review</a></li>
                    <li><a href="/ContactUs/dealersLogIn.html">Login</a></li>
                </ul>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- contact form -->
    <div class="contact-container">
        <div class="contact-form">
            <h2>Contact Us</h2>


            <form id="contactForm" action="https://api.web3forms.com/submit" method="post">
                <input type="hidden" name="access_key" value="e05f0856-1dd4-40ee-9e29-020b03fadce8"> <!-- Aceess Key -->
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="4" required></textarea>

                <button type="submit">Submit</button>
            </form>
        </div>

        <div class="map">
            <h2>Our Location</h2>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3786.5093155443983!2d72.85326361078833!3d19.24361618192074!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be7b13affffffff%3A0xfd071f1d3a7844ef!2sSt.%20Francis%20Institute%20of%20Technology!5e1!3m2!1sen!2sin!4v1730055347279!5m2!1sen!2sin" 
                width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </div>
    </div>

    <!-- Footer Section -->
    <footer>
       
        <div class="footer-bottom">
            <p>Copyrights © 2024 PEDALPULSE Pvt Ltd</p>

        </div>
    </footer>

    <!-- script for navbar hamburger menu -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hamburger = document.getElementById('hamburger');
            const navLinks = document.getElementById('navLinks');

            hamburger.addEventListener('click', () => {
                navLinks.classList.toggle('mobile');
            });
        });

    </script>
</body>

</html>
