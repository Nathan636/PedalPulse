<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and Register</title>
    <link rel="stylesheet" href="/ContactUs/dealerLogin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="../supabase-client.js"></script>
</head>
<body>
    <div class="container">
        <div id="login-form" class="form-container">
            <center><h2>LOGIN</h2></center>
            <form id="loginForm" onsubmit="loginUser(event)">
                <label for="login-email">Email:</label>
                <input type="email" id="loginEmail" required>
                <label for="login-password">Password:</label>
                <input type="password" id="loginPassword" required>
                <button type="button" id="login-show-password">Show Password</button>
                <button type="submit" class="btn">Login</button>
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </form>
        </div>
        <div id="register-form" class="form-container">
            <center><h2>REGISTER</h2></center>
            <form id="registrationForm">
                <label for="register-username">Username:</label>
                <input type="text" id="register-username" required>
                <label for="register-password">Password:</label>
                <input type="password" id="register-password" required>
                <button type="button" id="register-show-password">Show Password</button>
                <button type="button" class="btn" onclick="register()">Register</button>
                <p>Already have an account? <a href="#" onclick="showLoginForm()">Login here</a></p>
            </form>
        </div>
    </div>
    
    


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            showLoginForm();
            document.getElementById('login-show-password').addEventListener('click', () => togglePassword('loginPassword'));
            document.getElementById('register-show-password').addEventListener('click', () => togglePassword('register-password'));
        });
        
        function showLoginForm() {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('register-form').style.display = 'none';
        }
        
        function showRegisterForm() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
        }
        
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }
        
        async function loginUser(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                // Show success message
                Swal.fire({
                    title: 'Success!',
                    text: 'Login successful!',
                    icon: 'success',
                    confirmButtonColor: '#2ecc71'
                }).then(() => {
                    // Redirect to home page
                    window.location.href = '../index.html';
                });

            } catch (error) {
                Swal.fire({
                    title: 'Error!',
                    text: error.message,
                    icon: 'error',
                    confirmButtonColor: '#e74c3c'
                });
            }
        }
        
        function register() {
            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;

            if (username && password) {
                // Store user data in localStorage
                const userData = {
                    username: username,
                    password: password
                };
                localStorage.setItem(username, JSON.stringify(userData));
                
                // Show success message
                Swal.fire({
                    title: 'Success!',
                    text: 'Registration successful!',
                    icon: 'success',
                    confirmButtonColor: '#2ecc71'
                }).then(() => {
                    // Redirect to index.html
                    window.location.href = '../index.html';
                });
            } else {
                Swal.fire({
                    title: 'Error!',
                    text: 'Please fill in all fields',
                    icon: 'error',
                    confirmButtonColor: '#e74c3c'
                });
            }
        }
        
    </script>

</body>
</html>
