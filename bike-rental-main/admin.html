<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - PedalPulse</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .admin-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .admin-title {
            color: #2c3e50;
            font-size: 28px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-title i {
            color: #3498db;
        }

        .logout-btn {
            background-color: #e74c3c;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn:hover {
            background-color: #c0392b;
            transform: translateY(-2px);
        }

        .bike-management {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .bike-management h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bike-management h2 i {
            color: #3498db;
        }

        .bike-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 20px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        .bike-table th, .bike-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .bike-table th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .bike-table tr:hover {
            background-color: #f8f9fa;
        }

        .edit-btn, .save-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 5px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .edit-btn {
            background-color: #f1c40f;
            color: #000;
        }

        .edit-btn:hover {
            background-color: #f39c12;
            transform: translateY(-2px);
        }

        .save-btn {
            background-color: #2ecc71;
            color: white;
        }

        .save-btn:hover {
            background-color: #27ae60;
            transform: translateY(-2px);
        }

        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-container h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        .price-input, .available-input {
            width: 100px;
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }

        .price-input:focus, .available-input:focus {
            border-color: #3498db;
            outline: none;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        @media (max-width: 768px) {
            .admin-container {
                margin: 10px;
                padding: 15px;
            }

            .bike-table {
                display: block;
                overflow-x: auto;
            }

            .login-container {
                margin: 20px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Section -->
    <div id="loginSection" class="login-container">
        <h2><i class="fas fa-lock"></i> Admin Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
    </div>

    <!-- Admin Dashboard Section -->
    <div id="adminSection" class="admin-container" style="display: none;">
        <div class="admin-header">
            <h1 class="admin-title">
                <i class="fas fa-bicycle"></i> Admin Dashboard
            </h1>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
        
        <div class="bike-management">
            <h2><i class="fas fa-cog"></i> Bike Management</h2>
            <table class="bike-table">
                <thead>
                    <tr>
                        <th>Bike ID</th>
                        <th>Bike Name</th>
                        <th>Price (per day)</th>
                        <th>Available Units</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="bikeTableBody">
                    <!-- Bike data will be populated here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Admin credentials (in a real application, this would be handled server-side)
        const ADMIN_CREDENTIALS = {
            username: 'admin',
            password: 'admin123'
        };

        // Sample bike data (in a real application, this would come from a database)
        let bikes = [
            { id: 1, name: 'Bike Model 1', price: 100, available: 5, image: '/img/findbikes/bike1.jpeg', description: 'Short description of Bike Model 1.' },
            { id: 2, name: 'Bike Model 2', price: 100, available: 8, image: '/img/findbikes/bike2.jpeg', description: 'Short description of Bike Model 2.' },
            { id: 3, name: 'Bike Model 3', price: 100, available: 3, image: '/img/findbikes/bike3.jpeg', description: 'Short description of Bike Model 3.' },
            { id: 4, name: 'Bike Model 4', price: 100, available: 6, image: '/img/findbikes/bike4.jpeg', description: 'Short description of Bike Model 4.' },
            { id: 5, name: 'Bike Model 5', price: 100, available: 4, image: '/img/findbikes/bike5.jpeg', description: 'Short description of Bike Model 5.' },
            { id: 6, name: 'Bike Model 6', price: 100, available: 7, image: '/img/findbikes/bike11.jpeg', description: 'Short description of Bike Model 6.' },
            { id: 7, name: 'Bike Model 7', price: 100, available: 5, image: '/img/findbikes/bike12.jpeg', description: 'Short description of Bike Model 7.' },
            { id: 8, name: 'Bike Model 8', price: 100, available: 6, image: '/img/findbikes/bike13.jpeg', description: 'Short description of Bike Model 8.' },
            { id: 9, name: 'Bike Model 9', price: 100, available: 4, image: '/img/findbikes/bike23.jpeg', description: 'Short description of Bike Model 9.' }
        ];

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminSection').style.display = 'block';
                loadBikeData();
            } else {
                Swal.fire({
                    title: 'Error!',
                    text: 'Invalid credentials',
                    icon: 'error',
                    confirmButtonColor: '#e74c3c'
                });
            }
        });

        // Load bike data into table
        function loadBikeData() {
            const tableBody = document.getElementById('bikeTableBody');
            tableBody.innerHTML = '';

            bikes.forEach(bike => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${bike.id}</td>
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <img src="${bike.image}" alt="${bike.name}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px;">
                            <div>
                                <div style="font-weight: 500;">${bike.name}</div>
                                <div style="font-size: 12px; color: #666;">${bike.description}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span class="price-display">₹${bike.price}</span>
                        <input type="number" class="price-input" value="${bike.price}" style="display: none;">
                    </td>
                    <td>
                        <span class="available-display">${bike.available}</span>
                        <input type="number" class="available-input" value="${bike.available}" style="display: none;">
                    </td>
                    <td>
                        <button class="edit-btn" onclick="editRow(this)">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="save-btn" onclick="saveRow(this)" style="display: none;">
                            <i class="fas fa-save"></i> Save
                        </button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        // Edit row
        function editRow(button) {
            const row = button.closest('tr');
            row.querySelector('.price-display').style.display = 'none';
            row.querySelector('.price-input').style.display = 'inline-block';
            row.querySelector('.available-display').style.display = 'none';
            row.querySelector('.available-input').style.display = 'inline-block';
            button.style.display = 'none';
            row.querySelector('.save-btn').style.display = 'inline-block';
        }

        // Save row
        function saveRow(button) {
            const row = button.closest('tr');
            const bikeId = parseInt(row.cells[0].textContent);
            const newPrice = parseInt(row.querySelector('.price-input').value);
            const newAvailable = parseInt(row.querySelector('.available-input').value);

            // Update the bikes array
            const bikeIndex = bikes.findIndex(bike => bike.id === bikeId);
            if (bikeIndex !== -1) {
                bikes[bikeIndex].price = newPrice;
                bikes[bikeIndex].available = newAvailable;
                
                // Save to localStorage to persist changes
                localStorage.setItem('bikeData', JSON.stringify(bikes));
            }

            // Update the display
            row.querySelector('.price-display').textContent = `₹${newPrice}`;
            row.querySelector('.available-display').textContent = newAvailable;
            row.querySelector('.price-display').style.display = 'inline-block';
            row.querySelector('.price-input').style.display = 'none';
            row.querySelector('.available-display').style.display = 'inline-block';
            row.querySelector('.available-input').style.display = 'none';
            button.style.display = 'none';
            row.querySelector('.edit-btn').style.display = 'inline-block';

            // Show success message
            Swal.fire({
                title: 'Success!',
                text: 'Changes saved successfully',
                icon: 'success',
                confirmButtonColor: '#2ecc71'
            });
        }

        // Load saved bike data on page load
        document.addEventListener('DOMContentLoaded', function() {
            const savedBikeData = localStorage.getItem('bikeData');
            if (savedBikeData) {
                bikes = JSON.parse(savedBikeData);
            }
        });

        // Logout function
        function logout() {
            document.getElementById('adminSection').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('loginForm').reset();
        }
    </script>
</body>
</html>
